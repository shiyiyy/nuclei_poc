id: hardcoded-credentials-detector
info:
  name: Hardcoded Credentials Detector
  author: Caddyshack2175
  severity: critical
  description: |
    Detects hardcoded OAuth secrets and clientid credentials embedded in application configuration file or in the source code of responses.
  tags:
    - exposure
    - credentials
    - config
    - oauth

requests:
  - method: GET
    path: 
     - '{{BaseURL}}'

    matchers:
      - type: word
        words:
          - "client_secret"
          - "apiKey"
          - "access_token"
          - "AKIA"
          - "userPoolId"
        condition: or

    extractors:
      - type: regex
        name: amplify_credentials
        regex:
          - 'userPoolId["\s:]*[=:]\s*["]([a-z0-9_\-]+)["]'
          - 'identityPoolId["\s:]*[=:]\s*["]([a-z0-9:\-]+)["]'
          - 'client_id["\s:]*[=:]\s*["]([a-zA-Z0-9_\-]+)["]'
          - 'grant_type["\s:]*[:=]\s*["]([a-zA-Z0-9_\-]+)["]'
          - 'user_type["\s:]*[:=]\s*["]([a-zA-Z0-9_\-]+)["]'
          - 'token_end_point["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'graph_api["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'msTokenUrl["\s:]*[:=]\s*["]([a-zA-Z0-9\/\.\-_]+)["]'

      - type: regex
        name: aws_credentials
        regex:
          - 'userPoolId["\s:]*[=:]\s*["]([a-z0-9_\-]+)["]'
          - 'identityPoolId["\s:]*[=:]\s*["]([a-z0-9:\-]+)["]'
          - 'client_id["\s:]*[=:]\s*["]([a-zA-Z0-9_\-]+)["]'
          - 'userPoolWebClientId["\s:]*[=:]\s*["]([a-zA-Z0-9_\-]+)["]'
          - 'redirectSignIn["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'redirectSignOut["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'redirect_uri["\s:]*[=:]\s*["]([a-zA-Z0-9:\/\.\-_]+)["]'
          - 'authorizedScopes["\s:]*[:=]\s*\[(.*?)\]'

      - type: regex
        name: ms_client_secret
        regex:
          - 'graph_api["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'client_id["\s:]*[:=]\s*["]([a-zA-Z0-9\-]{20,})["]'
          - 'client_secret["\s:]*[=:]\s*["]([a-zA-Z0-9_\-/\[\]+=]{30,})["]'
          - 'redirect_uri["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'token_end_point["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'authorization_endpoint["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'issue_url["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'msTokenUrl["\s:]*[:=]\s*["]([a-zA-Z0-9\/\.\-_]+)["]'

      - type: regex
        name: google_client_secret
        regex:
          - 'client_id["\s:]*[:=]\s*["]([0-9]+-[a-zA-Z0-9]+\.apps\.googleusercontent\.com)["]'
          - 'client_secret["\s:]*[=:]\s*["]([a-zA-Z0-9_\-]{20,})["]'
          - 'redirect_uri["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'token_end_point["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
          - 'authorization_endpoint["\s:]*[=:]\s*["]([https://a-zA-Z0-9\.\-_\/]+)["]'
